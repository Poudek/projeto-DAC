<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Agenda - Horários</title>
    <link rel="icon" type="image/png" href="agenda.png-removebg-preview (1).png">
    <link rel="stylesheet" href="horarios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-content">
        <header class="main-header">
    <div class="header-content">
        <a href="dashboard.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
        
        <div class="logo-area">
            <div class="icon-box">
                <i class="fa-solid fa-clock"></i> </div>
            <div class="text-group">
                <h1>Horários</h1>
                <p>Gerencie seus horários</p>
            </div>
        </div>
    </div>
</header>

        <div class="content-container">
            
            <div class="calendar-nav">
    <button class="btn-nav-arrow" onclick="semanaAnterior()"><i class="fa-solid fa-chevron-left"></i></button>
    <span class="current-week">...</span>
    <button class="btn-nav-arrow" onclick="proximaSemana()"><i class="fa-solid fa-chevron-right"></i></button>
</div>

            <div class="days-row">
                <div class="day-card" onclick="selecionarDia('SEGUNDA', 30)">
                    <span>SEGUNDA</span>
                    <strong>30</strong>
                </div>
                <div class="day-card" onclick="selecionarDia('TERÇA', 31)">
                    <span>TERÇA</span>
                    <strong>31</strong>
                </div>
                <div class="day-card active" onclick="selecionarDia('QUARTA', 1)">
                    <span>QUARTA</span>
                    <strong>01</strong>
                </div>
                <div class="day-card" onclick="selecionarDia('QUINTA', 2)">
                    <span>QUINTA</span>
                    <strong>02</strong>
                    
                </div>
                <div class="day-card" onclick="selecionarDia('SEXTA', 3)">
                    <span>SEXTA</span>
                    <strong>03</strong>
                    
                </div>
                <div class="day-card" onclick="selecionarDia('SÁBADO', 4)">
                    <span>SÁBADO</span>
                    <strong>04</strong>
                    
                </div>
            </div>

            <div class="agenda-section">
                <!-- Procure por esta linha e adicione o id -->
<h3 id="data-atual-exibicao" style="text-transform: uppercase;">
    CARREGANDO DATA...
</h3>
                
                <div id="lista-agenda" class="agenda-list">
                    <div class="item-agenda">
                        <div class="item-time">
                            <strong>08:00</strong>
                            <span>09:40</span>
                        </div>
                        <div class="item-info">
                            <span class="badge aula"><i class="fa-solid fa-book-open"></i> Aula</span>
                            <h4>Matemática - 3º Ano A</h4>
                            <p>Sala 101</p>
                        </div>
                    </div>

                    <div id="lista-agenda" class="agenda-list">
    <div class="item-agenda">
        <div class="item-time">
            <strong>22:00</strong>
            <span>23:00</span>
            <i class="fa-solid fa-calendar-day icon-evento"></i>
        </div>
        <div class="item-info">
            <span class="badge evento">
                <i class="fa-solid fa-calendar-star"></i> Evento: Esportivo
            </span>
            <h4>Teste de Evento</h4>
            <p><i class="fa-solid fa-location-dot"></i> Auditório</p>
        </div>
    </div>

    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="horarios.js"></script>
</body>
</html>
