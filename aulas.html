<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Aulas</title>
    <link rel="stylesheet" href="aulas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="main-content">
    <div class="page-header">
        <div class="header-left">
            <a href="dashboard.html" class="btn-back">
    <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="icon-bg"><i class="fa-solid fa-book-open"></i>
            </div>
            <div>
                <h1>Aulas</h1>
            
            </div>
        </div>
    </div>

    <div class="content-container">
        <div class="top-actions">
    <div class="toggle-user">
    <button id="btn-view-professor" class="active" onclick="alternarVisao('professor')">
        <i class="fa-solid fa-graduation-cap"></i> Professor
    </button>
    <button id="btn-view-aluno" onclick="alternarVisao('aluno')">
        <i class="fa-solid fa-user"></i> Aluno
    </button>
</div>

    <button class="btn-nova-aula">
        <i class="fa-solid fa-plus"></i> Nova Aula
    </button>
</div>

        <div class="table-card">

            <table class="aulas-table">
                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>Turma</th>
                        <th>Sala</th>
                        <th>Dia</th>
                        <th>Horário</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-aulas">
                    </tbody>
            </table>
        </div>
    </div>
</div>
        </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <div id="modalAula" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Nova Aula</h2>
            <p>Preencha os dados da aula abaixo.</p>
            <span class="close-modal">&times;</span>
        </div>
        
        <form id="formAula">
            <div class="input-row">
    <div class="input-group">
        <label>Disciplina *</label>
        <select id="materia" required>
            <option value="">Selecione a matéria...</option>
            <option value="Desenvolvimento Web">Desenvolvimento Web</option>
            <option value="Redes">Redes</option>
            <option value="Lógica Matemática">Lógica Matemática</option>
            <option value="Arquitetura de Computadores">Arquitetura de Computadores</option>
            <option value="Engenharia de Software">Engenharia de Software</option>
            <option value="Bancos de Dados">Bancos de Dados</option>
            <option value="Desenvolvimento de Aplicações Corporativas">Desenvolvimento de Aplicações Corporativas</option>
            <option value="Tópicos Especiais em Sistemas de Informação">Tópicos Especiais em Sistemas de Informação</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="Métodos Avançados de Programação">Métodos Avançados de Programação</option>
            <option value="Computação em Nuvem">Computação em Nuvem</option>
        </select>
    </div>
    <div class="input-group">
        <label>Turma *</label>
        <input type="text" id="turma" placeholder="Ex: ADSN1" required>
    </div>
</div>

<div class="input-row">
    <div class="input-group" style="flex: 1.5;"> 
        <label>Sala *</label>
        <input type="text" id="sala" placeholder="Ex: Sala 101" required>
    </div>
    <div class="input-group">
        <label>Início *</label>
        <select id="horarioInicio" required>
            <option value="">--:--</option>
        </select>
    </div>
    <div class="input-group">
        <label>Término *</label>
        <select id="horarioTermino" required>
            <option value="">--:--</option>
        </select>
    </div>
</div>

            <div class="input-group">
                <label>Dia da Semana *</label>
                <select id="diaSemana" required>
                    <option value="">Selecione...</option>
                    <option value="Segunda">Segunda-feira</option>
                    <option value="Terça">Terça-feira</option>
                    <option value="Quarta">Quarta-feira</option>
                    <option value="Quinta">Quinta-feira</option>
                    <option value="Sexta">Sexta-feira</option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                <button type="submit" class="btn-salvar">Salvar Aula</button>
            </div>
        </form>
    </div>
</div>
<script src="script.js"></script>
<script src="aulas.js"></script>
</body>
</html>
