<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agenda de Professores</title>
    <style>
        :root {
            --verde-fundo: #90EE90;
            --verde-primario: #004d33; /* O verde da sua imagem */
            --branco: #ffffff;
            --cinza-claro: #f4f4f4;
        }

        body {
            background-color: var(--verde-fundo);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: var(--verde-primario);
            margin-bottom: 30px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: var(--branco);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        h2 {
            color: var(--verde-primario);
            border-bottom: 2px solid var(--verde-fundo);
            padding-bottom: 10px;
            margin-top: 0;
            font-size: 1.2rem;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--cinza-claro);
        }

        .item:last-child { border-bottom: none; }

        .hora {
            font-weight: bold;
            color: var(--verde-primario);
            background: var(--verde-fundo);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.85rem;
        }

        .info strong { display: block; color: #333; }
        .info span { font-size: 0.8rem; color: #777; }

        .badge-pendente {
            background-color: #ffcccb;
            color: #d32f2f;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Minha Agenda Acadêmica</h1>
        <p>Bem-vindo, Professor!</p>
    </div>

    <div class="dashboard-container">
        
        <div class="card">
            <h2>Próximas Aulas</h2>
            <div class="item">
                <div class="info">
                    <strong>Cálculo Diferencial I</strong>
                    <span>Sala 302 - Bloco A</span>
                </div>
                <div class="hora">08:00</div>
            </div>
            <div class="item">
                <div class="info">
                    <strong>Estrutura de Dados</strong>
                    <span>Laboratório 05</span>
                </div>
                <div class="hora">10:00</div>
            </div>
        </div>

        <div class="card">
            <h2>Pendências Urgentes</h2>
            <div class="item">
                <div class="info">
                    <strong>Lançar Notas - AV1</strong>
                    <span>Engenharia de Software</span>
                </div>
                <span class="badge-pendente">Hoje</span>
            </div>
            <div class="item">
                <div class="info">
                    <strong>Reunião de Colegiado</strong>
                    <span>Auditório Principal</span>
                </div>
                <span class="badge-pendente">Amanhã</span>
            </div>
        </div>

    </div>

</body>
</html>
