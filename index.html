<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Professores - Login</title>
    <style>
        /* Estilos e Cores */
        :root {
            --verde-claro-fundo: #90EE90; /* Verde claro do fundo original */
            --verde-botoes: #004d33;      /* Verde escuro da imagem fornecida */
            --verde-hover: #006644;       /* Um verde um pouco mais claro para o hover */
            --branco: #ffffff;
            --cinza-texto: #333;
            --cinza-sub s-claro: #888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--verde-claro-fundo);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animação de entrada do Card */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            background-color: var(--branco);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        h1 {
            color: var(--cinza-texto);
            margin-bottom: 25px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 15px; /* Reduzido para dar espaço ao link */
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--verde-claro-fundo);
        }

        /* Estilo para o link Esqueci minha senha */
        .forgot-password-container {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password-link {
            color: var(--cinza-sub-claro);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password-link:hover {
            color: var(--verde-botoes);
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--verde-botoes); /* Nova cor do botão */
            border: none;
            border-radius: 8px;
            color: var(--branco);                 /* Texto branco para contraste */
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--verde-hover);    /* Nova cor de hover */
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--cinza-sub-claro);
        }

    </style>
</head>
<body>

    <div class="login-container">
        <h1>Agenda de Professores</h1>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="matricula"><strong>Matrícula</strong></label>
                <input type="text" id="matricula" placeholder="Digite sua matrícula" required>
            </div>
            
            <div class="input-group">
                <label for="senha"><strong>Senha</strong></label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <div class="forgot-password-container">
                <a href="#" class="forgot-password-link"><strong>Esqueci minha senha</strong></a>
            </div>
            
            <button type="submit">Entrar</button>
        </form>

        <p class="footer-text">© 2026 Portal do Docente</p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Impede o recarregamento da página
        
        const matricula = document.getElementById('matricula').value;
        const senha = document.getElementById('senha').value;
        const btn = document.querySelector('button');

        // Simulação de validação simples
        if (matricula !== "" && senha !== "") {
            btn.innerText = 'Autenticando...';
            btn.style.opacity = '0.7';

            // Simula um tempo de resposta do banco de dados (1 segundo)
            setTimeout(() => {
                // Redireciona para a página da agenda
                window.location.href = "dashboards.html";
            }, 1000);
        } else {
            alert("Por favor, preencha todos os campos.");
        }
    });
</script>

</body>
</html>
