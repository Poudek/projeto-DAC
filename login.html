<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda do Professor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="split-container">
        <section class="banner-side">
            <div class="logo-circle">
                <span class="material-symbols-outlined">school</span>
            </div>
            <h1>Agenda do Professor</h1>
            <p>Gerencie seus horários, aulas, reuniões e eventos em um só lugar.</p>
        </section>
        <section class="form-side">
            <div class="login-box">
                <h2>Login</h2>
                <p>Acesse sua conta com matrícula e senha</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>Matrícula</label>
                        <input type="text" id="matricula" placeholder="Digite sua matrícula" required>
                    </div>

                    <div class="input-group">
                        <label>Senha</label>
                        <div class="password-field">
                            <input type="password" id="senha" placeholder="Digite sua senha" required>
                            <span class="material-symbols-outlined toggle-eye" onclick="togglePassword()">visibility</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>
                    <a href="#" class="link-forgot">Esqueci minha senha</a>
                    <a href="#" class="link-forgot">Não possuo conta</a>
                </form>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
