<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Reuniões</title>
    <link rel="icon" type="image/png" href="agenda.png-removebg-preview (1).png">
    <link rel="stylesheet" href="reunioes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
    <div class="header-content">
        <a href="dashboard.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        
        <div class="logo-area">
            <div class="icon-box">
                <i class="fa-solid fa-users"></i>
            </div>
            
            <div class="text-group">
                <h1>Reuniões</h1>
                <p>Gerencie suas reuniões</p>
            </div>
        </div>
    </div>
</header>

    <main class="container">
        <div class="title-bar">
            <h2>Minhas Reuniões</h2>
            <button class="btn-new" onclick="abrirModal()">
                <i class="fa-solid fa-plus"></i>
                Nova Reunião
            </button>
        </div>

        <section class="meetings-grid" id="gridReunioes">
    </section>
    </main>
<div class="modal-overlay" id="modalNovaReuniao">
    <div class="modal-container">
        <div class="modal-header">
            <div>
                <h2>Nova Reunião</h2>
                <p>Preencha os dados da reunião.</p>
            </div>
            <button class="btn-close" onclick="fecharModal()">&times;</button>
        </div>

        <form class="modal-form" id="formNovaReuniao">
    <div class="form-group">
        <label>Título *</label>
        <input type="text" id="reuniaoTitulo" placeholder="Ex: Reunião Pedagógica" class="input-highlight" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Data *</label>
            <input type="date" id="reuniaoData" required>
        </div>
        <div class="form-group">
            <label>Horário *</label>
            <input type="time" id="reuniaoHora" required>
        </div>
    </div>

    <div class="form-group">
        <label>Local *</label>
        <input type="text" id="reuniaoLocal" placeholder="Ex: Sala de Reuniões" required>
    </div>

    <div class="form-group">
        <label>Participantes</label>
        <input type="text" id="reuniaoParticipantes" placeholder="Ex: Coord. Pedagógica, Professores">
    </div>

    <div class="form-group">
        <label>Pauta</label>
        <textarea id="reuniaoPauta" placeholder="Assuntos a serem discutidos..." rows="4"></textarea>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button type="submit" class="btn-save">Salvar</button>
    </div>
</form>
    </div>
</div>
<script src="reunioes.js"></script>
</body>
</html>
