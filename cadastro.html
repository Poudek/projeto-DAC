<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" type="image/png" href="agenda.png-removebg-preview (1).png">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <div class="split-container">
        <section class="banner-side">
            <div class="logo-circle">
                <span class="material-symbols-outlined">school</span>
            </div>
            <h1>Agenda Acadêmica</h1>
            <p>Gerencie seus horários, aulas, reuniões e eventos em um só lugar.</p>
        </section>
        <section class="form-side">
            <div class="login-box">
                <h2>Criar Conta</h2>
                <p>Crie sua conta para acessar a agenda</p>

                <form id="cadastroForm">
    <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
    </div>

    <div class="input-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>Matrícula</label>
            <input type="text" id="matricula" placeholder="Nº da matrícula" required>
        </div>
        <div class="input-group">
            <!-- No seu formulário de cadastro -->
<label for="tipo-conta">Tipo de Conta</label>
<select id="tipo-conta" name="tipo-conta">
            <option value="">Selecione</option>
            <option value="professor">Professor</option>
            <option value="coordenador">Coordenador</option>
            <option value="secretaria">Secretaria</option>
            <option value="aluno">Aluno</option>
</select>
        </div>
    </div>

    <div class="input-group">
    <label>Senha</label>
    <div class="password-field">
        <input type="password" id="senha" placeholder="Digite sua senha" required>
        <span class="material-symbols-outlined toggle-eye" onclick="togglePassword('senha')">visibility</span>
    </div>
</div>

<div class="input-group">
    <label>Confirmar Senha</label>
    <div class="password-field">
        <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
        <span class="material-symbols-outlined toggle-eye" onclick="togglePassword('confirmar-senha')">visibility</span>
    </div>
</div>

    <button type="submit" class="btn-primary">Cadastrar</button>
    <a href="login.html" class="link-forgot">Já possuo conta</a>
</form>
            </div>
        </section>
    </div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
