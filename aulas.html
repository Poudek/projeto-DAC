<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Aulas</title>
    <link rel="icon" type="image/png" href="agenda.png-removebg-preview (1).png">
    <link rel="stylesheet" href="aulas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="main-content">
    <header class="main-header">
    <div class="header-content">
        <a href="dashboard.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        
        <div class="logo-area">
            <div class="icon-box">
                <i class="fa-solid fa-book-open"></i>
            </div>
            
            <div class="text-group">
                <h1>Aulas</h1>
                <p>Gerencie suas disciplinas e turmas</p>
            </div>
        </div>
    </div>
</header>

<main class="content-container">
    <div class="top-actions">
        <button onclick="exportarUsuariosPDF()" class="btn-export" id="btn-export-pdf">
            <i class="fas fa-file-pdf"></i> Exportar para PDF
        </button>
        <button class="btn-nova-aula" id="btnAbrirModalAula">
            <i class="fa-solid fa-plus"></i> Nova Aula
        </button>
        
    </div>

        <div class="table-card">

            <table class="aulas-table">
                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>Turma</th>
                        <th>Sala</th>
                        <th>Dia</th>
                        <th>Horário</th>
                        <th style="text-align: right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-aulas">
                    </tbody>
            </table>
        </div>
    </div>
</div>
        </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    
    <div id="modalAula" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h2>Nova Aula</h2>
                <p style="color: #2d7a50; font-size: 0.85rem; margin-top: 4px;">Preencha os dados da aula abaixo.</p>
            </div>
            <span class="close-modal">&times;</span>
        </div>
        
        <form id="formAula">
            <div class="input-row">
                <div class="input-group" style="flex: 2;">
                    <label>Disciplina *</label>
                    <select id="materia" required onfocus="this.size=5;" onblur="this.size=1;" onchange="this.size=1; this.blur();">
                        <option value="">Selecione a matéria...</option>
                        <option value="Desenvolvimento de Aplicações Corporativas">Desenvolvimento de Aplicações Corporativas</option>
                        <option value="Tópicos Especiais em Sistemas de Informação">Tópicos Especiais em Sistemas de Informação</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="Métodos Avançados de Programação">Métodos Avançados de Programação</option>
                        <option value="Computação em Nuvem">Computação em Nuvem</option>
                        <option value="Inteligência Artificial">Inteligência Artificial</option>
                        <option value="Engenharia de Software">Engenharia de Software</option>
                        <option value="Banco de Dados">Banco de Dados</option>
                        <option value="Redes de Computadores">Redes de Computadores</option>
                        <option value="Sistemas Operacionais">Sistemas Operacionais</option>
                        <option value="Programação Web">Programação Web</option>
                        <option value="Programação Mobile">Programação Mobile</option>
                        <option value="Análise de Algoritmos">Análise de Algoritmos</option>
                        </select>
                </div>
                <div class="input-group">
                    <label>Turma *</label>
                    <input type="text" id="turma" placeholder="Ex: ADSN1" required>
                </div>
            </div>

            <div class="input-row" style="gap: 30px;">
                <div class="input-group" style="flex: 1.5;"> 
                    <label>Sala *</label>
                    <input type="text" id="sala" placeholder="Ex: Sala 101" required>
                </div>
                <div class="input-group">
                    <label>Início *</label>
                    <input type="time" id="horarioInicio" required>
                </div>
                <div class="input-group">
                    <label>Término *</label>
                    <input type="time" id="horarioTermino" required>
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label>Dia da Semana *</label>
                <select id="diaSemana" required>
                    <option value="">Selecione...</option>
                    <option value="Segunda">Segunda-feira</option>
                    <option value="Terça">Terça-feira</option>
                    <option value="Quarta">Quarta-feira</option>
                    <option value="Quinta">Quinta-feira</option>
                    <option value="Sexta">Sexta-feira</option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancelar" id="btnCancelar">Cancelar</button>
                <button type="submit" class="btn-salvar">Salvar Aula</button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script src="aulas.js"></script>

</body>
</html>
